<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080, initial-scale=1.0">
    <title>GS25 편의점 택배 키오스크-search</title>
    <link rel="stylesheet" href="/hci-gs25-delivery-kiosk/stylesheets/search.css">
    <link rel="stylesheet" href="/hci-gs25-delivery-kiosk/stylesheets/style.css">
    <script src="https://unpkg.com/hangul-js"></script>    
</head>
<body onclick="updateActionButtonForSearch()">
    <div class="viewport">
        <img class="bar" src="/hci-gs25-delivery-kiosk/assets/images/상단bar.png" alt="">
        <h1 class="search">보내는 주소 등록</h1>
        <div class="menus">
            <div class="first-page">
                <img class="home-icon" src="/hci-gs25-delivery-kiosk/assets/images/icons_home.png" alt="">
                <span class="home-text">초기 화면</span>
            </div>
            <img class="question-icon" src="/hci-gs25-delivery-kiosk/assets/images/icons_question.png" onclick="openHelp()" alt="">
        </div>

        <!-- 도움말 팝업 -->
        <!-- <div id="helpPopup" class="popup-overlay" style="display: none;">
            <div class="popup-content">
              <img src="/hci-gs25-delivery-kiosk/assets/images/support_bg.png" alt="도움말" class="help-image">
              <button class="popup-close" onclick="closeHelp()">
                <img src="/hci-gs25-delivery-kiosk/assets/images/button_close.png" alt="">
              </button>
            </div>
        </div> -->

        <div class="search-container">
            <div class="search-field">
                <h3 class="all-search">통합검색</h3>
                <div class="search-bar">
                    <input type="text" id="keyword" placeholder="검색할 주소를 입력해주세요" readonly onclick="setActiveInput(this)">
                    <button class="glass-btn" onclick="searchAddress()">
                        <img class="glass-icon" src="/hci-gs25-delivery-kiosk/assets/images/icons_search.png" alt="검색">
                    </button>
                </div>
            </div>
            <p>검색어 예 : 도로명 주소 (동일로 30길 50), 지번 주소(돈암동 1234), 건물명(성신여자대학교</p>
            <p>초성 검색 : 돈암동 → ㄷㅇㄷ 30길</p>

            <div id="selectedAddress" style="display: none;"></div>

            <div class="show-result">
                <img class="result-not" src="/hci-gs25-delivery-kiosk/assets/images/icons_dashNotSelect.png" alt="">
                <span class="result-text">검색 결과</span>
            </div>
            
            <div id="results"></div>

            <div id="enteredKeyword" class="search-feedback-box"></div>

            <div id="noResultInfo" class="no-result-info" style="display: none;">
                <p class="noResult-info">예) 도 로 명(신주소) : 테헤란로 201<br>
                   예) 지&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;번(구주소) : 역삼동 679-5<br>
                   예) 건 물 명 : 아주빌딩<br></p>
                <p class="noResultText">검색한 주소가 안 나와 답답하신가요?</p>
              
                <button class="manual-search-btn">지번 주소로 수동 찾기</button>
            </div>
    
            <div id="pagination">
                <button class="arrow-btn" onclick="prevPage()">
                    <img class="arrow-btn btn-leftNo" src="/hci-gs25-delivery-kiosk/assets/images/button_leftNo.png" alt="">
                </button>
    
                <span id="page-info">
                    <span class="page-number active">1</span>
                    <span class="spliter">/</span>
                    <span class="page-total">1</span>
                </span>
    
                <button class="arrow-btn" onclick="nextPage()">
                    <img class="arrow-btn btn-rightYes" src="/hci-gs25-delivery-kiosk/assets/images/button_rightYes.png" alt="">
                </button>
            </div>
        </div>

        <div class="bottom-bar">
            <button class="prev-btn btn common-prev" onclick="backToPrev()">
                <img class="prev-icon" src="/hci-gs25-delivery-kiosk/assets/images/button_previous.png" alt="">
                <span>이전으로</span>
            </button>
            
          
            <img class="logo" src="/hci-gs25-delivery-kiosk/assets/images/logo_GS25.png" alt="">
          
            <button id="actionButton" class="next-btn btn" onclick="confirmSelection()" disabled>
              <span id="actionLabel">입력 완료</span>
            </button>
          </div>
        
        <div id="keyboardContainer" class="keyboard-container"></div>
    </div>
    
    <script src="https://code.jquery.com/jquery-1.8.3.min.js"></script>
    <script src="/hci-gs25-delivery-kiosk/scripts/keyboard.js"></script>
    <script src="/hci-gs25-delivery-kiosk/scripts/searchAddress.js"></script>
    <script src="/hci-gs25-delivery-kiosk/scripts/etcFtn.js"></script>
</body>
</html>
