    <div class="viewport">
        <img class="bar" src="/assets/images/상단bar.png" alt="">
        <h1 class="search">보내는 주소 등록</h1>
        <div class="menus">
            <div class="first-page">
                <img class="home-icon" src="/assets/images/icons_home.png" alt="">
                <span class="home-text">초기 화면</span>
            </div>
            <img class="question-icon" src="/assets/images/icons_question.png" alt="">
        </div>

        <div class="search-container">
            <div class="search-field">
                <h3>통합검색</h3>
                <div class="search-bar">
                    <input type="text" id="keyword" placeholder="검색할 주소를 입력해주세요" readonly onclick="setActiveInput(this)">
                    <button class="search-btn" onclick="searchAddress()">
                        <img class="search-icon" src="/assets/images/icons_search.png" alt="검색">
                    </button>
                </div>
            </div>
            <p>검색어 예 : 도로명 주소 (동일로 30길 50), 지번 주소(돈암동 1234), 건물명(성신여자대학교</p>
            <p>초성 검색 : 돈암동 → ㄷㅇㄷ 30길</p>

            <div class="show-result">
                <img class="result-not" src="/assets/images/icons_dashNotSelect.png" alt="">
                <span class="result-text">검색 결과</span>
            </div>
    
            <div id="results"></div>
    
            <div id="pagination">
                
    
                <button class="arrow-btn" onclick="prevPage()">
                    <img class="arrow-btn btn-leftNo" src="/assets/images/button_leftNo.png" alt="">
                </button>
    
                <span id="page-info">
                    <span class="page-number active">1</span>
                    <span class="spliter">/</span>
                    <span class="page-total">1</span>
                </span>
    
                <button class="arrow-btn" onclick="nextPage()">
                    <img class="arrow-btn btn-rightYes" src="/assets/images/button_rightYes.png" alt="">
                </button>
    
                
            </div>
            
        </div>
        <div class="bottom-bar">
            <button class="prev-btn btn" onclick="backToPrev()">
                <img class="dash-white" src="/assets/images/button_previous.png" alt=""> 이전으로
            </button>
            <img class="logo" src="/assets/images/logo_GS25.png" alt="">
            <button class="next-btn btn" onclick="confirmSelection()">
                <span>선택완료</span>
                <img class="dash-grey" src="/assets/images/button_inputNotCompleted.png" alt="">
            </button>
        </div>
        

        <div id="keyboardContainer" class="keyboard-container"></div>
    </div>
    
    <script src="https://code.jquery.com/jquery-1.8.3.min.js"></script>
    <script src="/scripts/keyboard.js"></script>
    <script src="/scripts/searchAddress.js"></script>
