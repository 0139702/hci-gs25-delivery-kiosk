<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>GS25 편의점 택배 키오스크</title>
  <link rel="stylesheet" href="/stylesheets/style.css">
  <script src="https://unpkg.com/hangul-js"></script>
</head>
<body>
    <div class="viewport">
        <div class="form-wrapper">
            <img class="bar" src="/assets/images/상단bar.png" alt="">
            <h1 class="search">배송정보 등록</h1>
        
            <!-- 보내는 사람 -->
            <div class="sender">
                <div class="input-section">
                    <input type="text" id="senderName" placeholder="보내는 사람 이름" onclick="setActiveInput(this)" readonly>
                </div>
            
                <div class="input-section">
                    <input type="text" id="senderPhone" placeholder="휴대폰 번호 입력" class="numeric" onclick="setActiveInput(this)" readonly>
                </div>
    
                <div class="search-field">
                    <input type="text" id="senderMainAddress" placeholder="주소 입력" readonly onclick="setActiveInput(this)">
                    <button class="search-btn" onclick="goToSearchPage('senderMainAddress')">주소 검색</button>
                </div>
              
                <div class="detail-field">
                    <input type="text" id="senderDetailAddress" placeholder="상세 주소를 입력해주세요" onclick="setActiveInput(this)">
                </div>
            </div>
        
            <!-- 받는 사람 -->
            <div class="receiver">
                <div class="input-section">
                    <input type="text" id="receiverName" placeholder="받는 사람 이름" onclick="setActiveInput(this)" readonly>
                </div>
              
                <div class="input-section">
                        <input type="text" id="receiverPhone" placeholder="휴대폰 번호 입력" class="numeric" onclick="setActiveInput(this)" readonly>
                </div>
    
                <div class="search-field">
                    <input type="text" id="receiverMainAddress" placeholder="주소 입력" readonly onclick="setActiveInput(this)">
                    <button class="search-btn" onclick="goToSearchPage('receiverMainAddress')">주소 검색</button>
                </div>
              
                <div class="detail-field">
                    <input type="text" id="receiverDetailAddress" placeholder="상세 주소를 입력해주세요" onclick="setActiveInput(this)">
                </div>
            </div>
        
            <div id="keyboardContainer" class="keyboard-container">
                <!-- 키보드는 JS에서 렌더링 -->
            </div>
    </div>
  <!-- <script src="/scripts/script.js"></script> -->
  <script src="/scripts/keyboard.js"></script>
  <script src="/scripts/indexPage.js"></script>
</body>
</html>
